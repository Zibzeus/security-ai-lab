services:
  agent:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - agent-data:/data
      - ./knowledge:/app/knowledge:ro
      - ./policies:/app/policies:ro
      - ./skills:/app/skills:ro
      - ./connectors:/app/connectors:ro
      - ./local-certs:/app/local-certs:ro
      - ./rag-sources:/app/rag-sources:ro
    mem_limit: ${AGENT_MEMORY_LIMIT:-768m}
    cpus: ${AGENT_CPUS:-1}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      llama:
        condition: service_started

  caddy:
    image: caddy:2.8.4-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    mem_limit: 128m
    cpus: 0.25
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      - agent

  llama:
    image: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    restart: unless-stopped
    command:
      - "-m"
      - "/models/Qwen3-4B-Q4_K_M.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "-c"
      - "${LLM_CONTEXT_SIZE:-2048}"
      - "-t"
      - "${LLAMA_THREADS:-3}"
      - "-b"
      - "${LLM_BATCH_SIZE:-64}"
      - "--parallel"
      - "1"
      - "--jinja"
    volumes:
      - ./models:/models:ro
    mem_limit: ${LLAMA_MEMORY_LIMIT:-5500m}
    cpus: ${LLAMA_CPUS:-3}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  agent-data:
  caddy-data:
  caddy-config:
